<!DOCTYPE html>
<html>
<head>
<title>Q4 Drill 2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
text-align:center;
background-image:url("https://wallpaperaccess.com/full/7752044.jpg");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
min-height:100vh;
}

.box{
width:350px;
margin:auto;
margin-top:120px;
background:#222;
color:rgb(255, 210, 63);
padding:20px;
border-radius:10px;
}



</style>
</head>

<body>

<div class="box">

<h2>Heat Index Checker</h2>

<details>
<summary>Instructions</summary>
<p>Enter the temperature in Celsius and humidity in percentage. Click Check to see the heat index and status</p>
</details>

<p>Degree in Celsius</p>
<input type="number" id="temp" class="form-control">

<p>Humidity in Percentage</p>
<input type="number" id="humidity" class="form-control">

<br>

<button class="btn btn-warning" onclick="HeatIndex()">Check Heat Index</button>

<p id="output"></p>

</div>

<script>

function HeatIndex(){

temp = parseFloat(document.getElementById("temp").value);
humidity = parseFloat(document.getElementById("humidity").value);

HI = temp + (.033 * humidity) - 4; //heat index formula

status = ""; //initialize empty value

switch(true) {

case (HI <= 27):
status = "Comfortable / Cool";
break;

case (HI >= 28 && HI <= 32):
status = "Warm";
break;

case (HI >= 33 && HI <= 37):
status = "Hot";
break;

case (HI >= 38 && HI <= 41):
status = "Very Hot / Caution";
break;

case (HI >= 42):
status = "Extreme Heat / Danger";
break;

}

document.getElementById("output").innerHTML =
"Heat Index: " + HI.toFixed(2) + "°C <br>Status: " + status;

}

//reference for background image: https://wallpaperaccess.com/full/7752044.jpg

</script>

</body>
</html>
